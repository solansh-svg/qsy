<!DOCTYPE html>
<html>
<head>
    <title>Ejercicio 3</title>
</head>
<body>
    
    <nav style="background: #eee; padding: 10px; margin-bottom: 20px;">
        <strong>Menú:</strong>
        <a href="index.html">Ejercicio 1</a> 
        <a href="ejercio2.html">Ejercicio 2</a> 
        <a href="ejercio3.html">Ejercicio 3</a> 
        <a href="ejecicio4.html">Ejercicio 4</a>
    </nav>

    <h2>🧪 Caldero de Alquimia</h2>
    <input id="task" placeholder="Nombre del ingrediente...">
    <button onclick="addTask()">Añadir al Caldero</button>
    <ul id="list" style="list-style-type: '✨ ';"></ul>
    <button onclick="clearAll()">Vaciar Caldero</button>

    <script>
        let tasks = [];
        function displayTasks() {
            let html = "";
            for (let i = 0; i < tasks.length; i++) {
                html += "<li>" + tasks[i].toUpperCase() + 
                " <button onclick='removeTask(" + i + ")'>Retirar</button></li>";
            }
            document.getElementById("list").innerHTML = html;
        }

        function addTask() {
            let taskInput = document.getElementById("task");
            let text = taskInput.value;
            if (text === "") return;
            tasks.push(text);
            taskInput.value = "";
            saveTasks();
            displayTasks();
        }

        function removeTask(i) { tasks.splice(i, 1); saveTasks(); displayTasks(); }
        function clearAll() {
            if(confirm("¿Vaciar?")) { tasks = []; saveTasks(); displayTasks(); }
        }
        function saveTasks() { localStorage.setItem("tasks", JSON.stringify(tasks)); }
        function loadTasks() {
            let saved = localStorage.getItem("tasks");
            if (saved !== null) { tasks = JSON.parse(saved); }
        }
        loadTasks();
        displayTasks();
    </script>
</body>
</html>
